openapi: 3.0.3
info:
  title: Category API
  version: 1.0.0
  description: Category management API used by the merchandising team.
  x-domain: catalog
  x-business-capability: category-management
  x-data-sensitivity: internal
  contact:
    name: API Governance Team
    email: api-governance@example.com
    url: https://developer.example.com/support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: https://api.example.com/api/v1
  description: Primary API endpoint.
tags:
- name: CategoryItem
  description: Operations for managing categories.
- name: Health
  description: Operational health and diagnostics.
paths:
  /Category_Items:
    get:
      summary: List categories
      operationId: CategoryItemsGet
      responses:
        '200':
          description: CategoryItem collection.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryItem'
                description: List of categories.
              example:
              - id: cat-1001
                categoryName: Accessories
                displayOrder: 1
                isVisible: true
        '400':
          description: Standard error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: validation_error
                message: The payload is invalid.
      description: Returns the current collection of categories.
      tags:
      - CategoryItem
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - read
    post:
      summary: Create categoryitem
      operationId: CategoryItemsPost
      responses:
        '201':
          description: CategoryItem created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/category_item'
              example:
                id: cat-1001
                categoryName: Accessories
                displayOrder: 1
                isVisible: true
        '400':
          description: Standard error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: validation_error
                message: The payload is invalid.
      description: Creates a new categoryitem resource using the provided payload.
      tags:
      - CategoryItem
      requestBody:
        required: true
        description: Payload used to create a categoryitem.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryItemCreateRequest'
            example:
              categoryName: Accessories
              displayOrder: 1
              isVisible: true
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - write
  /Category_Items/{CategoryId}:
    get:
      summary: Get categoryitem
      operationId: GetCategoryItemById
      responses:
        '200':
          description: CategoryItem response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/category_item'
              example:
                id: cat-1001
                categoryName: Accessories
                displayOrder: 1
                isVisible: true
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Resource not found.
      description: Retrieves a single categoryitem by identifier.
      tags:
      - CategoryItem
      parameters:
      - name: CategoryId
        in: path
        required: true
        description: Category identifier with uppercase naming.
        schema:
          type: string
        example: cat-1001
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - read
    patch:
      summary: Update categoryitem
      operationId: Update_Category_Item
      responses:
        '200':
          description: CategoryItem response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/category_item'
              example:
                id: cat-1001
                categoryName: Accessories
                displayOrder: 1
                isVisible: true
        '400':
          description: Standard error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: validation_error
                message: The payload is invalid.
      description: Applies a partial update to the selected categoryitem.
      tags:
      - CategoryItem
      requestBody:
        required: true
        description: Fields to update on the categoryitem.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryItemCreateRequest'
            example:
              categoryName: Accessories
              displayOrder: 1
              isVisible: true
      parameters:
      - name: CategoryId
        in: path
        required: true
        description: Category identifier with uppercase naming.
        schema:
          type: string
        example: cat-1001
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - write
    delete:
      summary: Delete categoryitem
      operationId: DeleteCategoryItem
      responses:
        '204':
          description: Resource deleted.
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Resource not found.
      description: Removes the selected categoryitem resource.
      tags:
      - CategoryItem
      parameters:
      - name: CategoryId
        in: path
        required: true
        description: Category identifier with uppercase naming.
        schema:
          type: string
        example: cat-1001
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - write
  /health:
    get:
      summary: Check service health
      operationId: get-health-status
      responses:
        '200':
          description: Health check succeeded.
          content:
            application/json:
              schema:
                type: object
                description: Health response payload.
                properties:
                  status:
                    type: string
                    description: Overall status.
                    example: UP
                  time:
                    type: string
                    description: Evaluation timestamp.
                    example: '2026-06-22T11:36:48Z'
                    format: date-time
                additionalProperties: false
                required:
                - status
                - time
              example:
                status: UP
                time: '2026-06-22T11:36:48Z'
      description: Returns liveness and readiness indicators for monitoring systems.
      tags:
      - Health
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security: []
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.com/oauth/authorize
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            read: Read access to API resources.
            write: Write access to API resources.
            payments: Manage payments and financial workflows.
            admin: Administrative access for platform operators.
  schemas:
    CategoryItemCreateRequest:
      type: object
      description: Create request using inconsistent field naming.
      properties:
        category_name:
          type: string
          description: Category name using underscores.
          example: Accessories
        display_order:
          type: integer
          description: Sort order using snake case.
          example: 1
          minimum: 0
        is_visible:
          type: boolean
          description: Visibility flag using snake case.
          example: true
      additionalProperties: false
      required:
      - category_name
      - display_order
    Error:
      type: object
      description: Standard API error payload.
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          example: resource_not_found
        message:
          type: string
          description: Human-readable error summary.
          example: The requested resource was not found.
        correlationId:
          type: string
          description: Request trace identifier.
          example: TRACE-20260622-001
      additionalProperties: false
      required:
      - code
      - message
    category_item:
      type: object
      description: CategoryItem representation.
      properties:
        id:
          type: string
          description: Category identifier.
          example: cat-1001
        category_name:
          type: string
          description: Category name using underscores.
          example: Accessories
        display_order:
          type: integer
          description: Sort order using snake case.
          example: 1
          minimum: 0
        is_visible:
          type: boolean
          description: Visibility flag using snake case.
          example: true
      additionalProperties: false
      required:
      - id
      - category_name
      - display_order
security:
- oauth2:
  - read
  - write
