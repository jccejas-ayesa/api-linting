openapi: 3.0.3
info:
  title: Enterprise Data Hub API
  version: 4.0.0
  description: Enterprise data hub for datasets, lineage, exports, and pipelines across
    business domains.
  x-domain: data-platform
  x-business-capability: data-product-management
  x-data-sensitivity: restricted
  contact:
    name: API Governance Team
    email: api-governance@example.com
    url: https://developer.example.com/support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
- url: https://datahub.example.com/api/v4
  description: Primary production endpoint.
- url: http://datahub-dr.example.com/api/v4
  description: Disaster recovery endpoint still using HTTP.
tags:
- name: Datasets
  description: Dataset operations.
- name: Pipelines
  description: Pipeline operations.
- name: Exports
  description: Export operations.
- name: Lineage
  description: Lineage operations.
- name: Health
  description: Operational monitoring.
paths:
  /datasets:
    get:
      summary: List datasets
      operationId: list-datasets
      responses:
        '200':
          description: Dataset collection.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
              example:
              - id: dset-1001
                name: sales-orders
                ownerTeam: data-eng
      description: Lists catalog datasets.
      tags:
      - Datasets
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - read
      - queryKey: []
    post:
      summary: Create dataset
      operationId: create-dataset
      responses:
        '201':
          description: Dataset created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
              example:
                id: dset-1001
                name: sales-orders
                ownerTeam: data-eng
      description: Creates a new dataset definition.
      tags:
      - Datasets
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetInput'
            example:
              name: sales-orders
              ownerTeam: data-eng
              retentionDays: 365
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - write
      - queryKey: []
  /datasets/{datasetId}/partitions:
    get:
      summary: List dataset partitions
      operationId: list-dataset-partitions
      responses:
        '200':
          description: Partition collection.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Partition'
              example:
              - partitionKey: '2026-06-22'
                rowCount: 12345
      description: Lists physical partitions for a dataset.
      tags:
      - Datasets
      parameters:
      - name: datasetId
        in: path
        required: true
        description: Dataset identifier.
        schema:
          type: string
        example: dset-1001
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - read
      - queryKey: []
  /pipelines:
    get:
      summary: List pipelines
      operationId: list-pipelines
      responses:
        '200':
          description: Pipeline collection.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pipeline'
              example:
              - id: pl-1001
                name: daily-sales-etl
                status: active
      description: Lists ingestion and transformation pipelines.
      tags:
      - Pipelines
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - read
      - queryKey: []
    post:
      summary: Create pipeline
      operationId: create-pipeline
      responses:
        '202':
          description: Pipeline accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
              example:
                id: pl-1001
                name: daily-sales-etl
                status: draft
      description: Creates a pipeline definition.
      tags:
      - Pipelines
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PipelineInput'
            example:
              name: daily-sales-etl
              schedule: 0 0 * * *
              sourceDatasetId: dset-1001
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - write
      - queryKey: []
  /exports:
    post:
      summary: Create export
      operationId: create-export
      responses:
        '201':
          description: Export created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                id: exp-1001
                datasetId: dset-1001
                status: queued
      description: Creates a bulk export job.
      tags:
      - Exports
      requestBody:
        required: true
        description: Request payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportInput'
            example:
              datasetId: dset-1001
              format: PARQUET
              destination:
                bucket: exports-prod
                path: sales/2026/06/22
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - write
      - queryKey: []
  /lineage/{entityId}:
    get:
      summary: Get lineage
      operationId: get-lineage
      responses:
        '200':
          description: Lineage response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageGraph'
              example:
                entityId: dset-1001
                upstream:
                - src-warehouse
                downstream:
                - sales-dashboard
      description: Returns upstream and downstream lineage edges for an entity.
      tags:
      - Lineage
      parameters:
      - name: entityId
        in: path
        required: true
        description: Lineage entity identifier.
        schema:
          type: string
        example: dset-1001
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security:
      - oauth2:
        - read
      - queryKey: []
  /health:
    get:
      summary: Check service health
      operationId: get-health-status
      responses:
        '200':
          description: Health check succeeded.
          content:
            application/json:
              schema:
                type: object
                description: Health response payload.
                properties:
                  status:
                    type: string
                    description: Overall status.
                    example: UP
                  time:
                    type: string
                    description: Evaluation timestamp.
                    example: '2026-06-22T11:36:48Z'
                    format: date-time
                additionalProperties: false
                required:
                - status
                - time
              example:
                status: UP
                time: '2026-06-22T11:36:48Z'
      description: Returns liveness and readiness indicators for monitoring systems.
      tags:
      - Health
      parameters:
      - name: X-Correlation-Id
        in: header
        required: false
        description: Trace identifier used to correlate requests across services.
        schema:
          type: string
        example: TRACE-20260622-001
      security: []
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.com/oauth/authorize
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            read: Read access to API resources.
            write: Write access to API resources.
            payments: Manage payments and financial workflows.
            admin: Administrative access for platform operators.
    queryKey:
      type: apiKey
      in: query
      name: api_key
  schemas:
    Dataset:
      type: object
      description: Dataset definition.
      properties:
        id:
          type: string
          description: Dataset id.
          example: dset-1001
        name:
          type: string
          description: Dataset name.
          example: sales-orders
        ownerTeam:
          type: string
          description: Owning team.
          example: data-eng
      additionalProperties: false
      required:
      - id
      - name
      - ownerTeam
    DatasetInput:
      type: object
      description: Dataset create payload.
      properties:
        name:
          type: string
          description: Dataset name.
          example: sales-orders
        ownerTeam:
          type: string
          description: Owning team.
          example: data-eng
        retentionDays:
          type: integer
          description: Retention in days.
          example: 365
          minimum: 1
      additionalProperties: false
      required:
      - name
      - ownerTeam
    Partition:
      type: object
      description: Dataset partition.
      properties:
        partitionKey:
          type: string
          description: Partition identifier.
          example: '2026-06-22'
        rowCount:
          type: integer
          description: Rows in partition.
          example: 12345
          minimum: 0
      additionalProperties: false
      required:
      - partitionKey
      - rowCount
    Pipeline:
      type: object
      description: Pipeline definition.
      properties:
        id:
          type: string
          description: Pipeline id.
          example: pl-1001
        name:
          type: string
          description: Pipeline name.
          example: daily-sales-etl
        status:
          type: string
          description: Pipeline status.
          example: active
          enum:
          - draft
          - active
          - paused
      additionalProperties: false
      required:
      - id
      - name
      - status
    PipelineInput:
      type: object
      description: Pipeline create payload.
      properties:
        name:
          type: string
          description: Pipeline name.
          example: daily-sales-etl
        schedule:
          type: string
          description: Cron schedule.
          example: 0 0 * * *
        sourceDatasetId:
          type: string
          description: Source dataset.
          example: dset-1001
      additionalProperties: false
      required:
      - name
      - schedule
      - sourceDatasetId
    ExportJob:
      type: object
      description: Bulk export job.
      properties:
        id:
          type: string
          description: Export id.
          example: exp-1001
        datasetId:
          type: string
          description: Dataset id.
          example: dset-1001
        status:
          type: string
          description: Export status.
          example: queued
          enum:
          - queued
          - running
          - completed
      additionalProperties: false
      required:
      - id
      - datasetId
      - status
    ExportInput:
      type: object
      description: Export create payload.
      properties:
        datasetId:
          type: string
          description: Dataset id.
          example: dset-1001
        format:
          type: string
          description: Export format.
          example: PARQUET
          enum:
          - PARQUET
          - CSV
        destination:
          type: object
          description: Nested destination settings.
          properties:
            bucket:
              type: string
              description: Storage bucket.
              example: exports-prod
            path:
              type: string
              description: Object prefix.
              example: sales/2026/06/22
      additionalProperties: false
      required:
      - datasetId
      - format
      - destination
    LineageGraph:
      type: object
      description: Lineage graph.
      properties:
        entityId:
          type: string
          description: Entity id.
          example: dset-1001
        upstream:
          type: array
          items:
            type: string
          description: Upstream entities.
          example:
          - src-warehouse
        downstream:
          type: array
          items:
            type: string
          description: Downstream entities.
          example:
          - sales-dashboard
      additionalProperties: false
      required:
      - entityId
      - upstream
      - downstream
    Error:
      type: object
      description: Standard API error payload.
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
          example: resource_not_found
        message:
          type: string
          description: Human-readable error summary.
          example: The requested resource was not found.
        correlationId:
          type: string
          description: Request trace identifier.
          example: TRACE-20260622-001
      additionalProperties: false
      required:
      - code
      - message
security:
- oauth2:
  - read
  - write
- queryKey: []
